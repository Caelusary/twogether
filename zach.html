<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zach's View — Holly's Mood 👀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --white: #FFFFFF; --brown: #4A3B33; --ink: #2B2320; }

  body.mood-happy{ --bg-top:#FDF1E6; --bg-bottom:#FBE4D0; --loose-text:#7A6459; --accent:#FF8FA8; }
  body.mood-tired{ --bg-top:#EDE7F6; --bg-bottom:#D9CFEA; --loose-text:#6B6079; --accent:#9C8FC2; }
  body.mood-sad{ --bg-top:#E3EEF9; --bg-bottom:#C9DFF0; --loose-text:#5C7288; --accent:#6FA3D1; }
  body.mood-mad{ --bg-top:#FFE0D2; --bg-bottom:#FFB99F; --loose-text:#8A4A36; --accent:#FF6B4A; }
  body.mood-hungry{ --bg-top:#FFF3D6; --bg-bottom:#FFDFA0; --loose-text:#8A6A2C; --accent:#FFA83D; }
  body.mood-sleepy{ --bg-top:#3A3560; --bg-bottom:#22203E; --loose-text:#CFC9EA; --accent:#9E90D8; }
  body.mood-excited{ --bg-top:#FFEE9E; --bg-bottom:#FFB3DE; --loose-text:#8A5A72; --accent:#FF5FA8; }
  body.mood-naughty{ --bg-top:#F1DFFF; --bg-bottom:#FFCCEB; --loose-text:#7A4F8A; --accent:#C463D9; }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body{ margin:0; padding:0; min-height:100%; }

  body{
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    transition: background 0.7s ease;
    font-family: 'Quicksand', sans-serif;
    color: var(--brown);
    display:flex; justify-content:center;
    min-height:100vh; position:relative; overflow-x:hidden;
  }

  #particle-layer{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:1; }
  .floating-particle{
    position:absolute; bottom:-10%; font-size:20px; opacity:0.85;
    animation-name: float-up; animation-timing-function: ease-in; animation-fill-mode: forwards; user-select:none;
  }
  @keyframes float-up{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.9; } 90%{ opacity:0.7; }
    100%{ transform: translateY(-110vh) translateX(var(--drift,20px)) rotate(25deg); opacity:0; }
  }

  .page{
    position:relative; z-index:2; width:100%; max-width:480px;
    padding:32px 20px 48px; display:flex; flex-direction:column; align-items:center; text-align:center;
  }

  header{ margin-bottom:8px; }
  .names{ font-family:'Baloo 2',cursive; font-weight:700; font-size:clamp(24px,7vw,32px); color:var(--accent); margin:0; letter-spacing:0.5px; transition:color 0.6s ease; }
  .private-tag{
    display:inline-flex; align-items:center; gap:6px; margin-top:12px; padding:6px 16px;
    background:rgba(255,255,255,0.6); border-radius:999px; font-size:12px; font-weight:700;
    color:var(--loose-text); letter-spacing:0.5px; text-transform:uppercase; transition:color 0.6s ease;
  }

  .section-title{ margin-top:26px; font-family:'Baloo 2',cursive; font-weight:700; font-size:clamp(18px,5vw,22px); color:var(--accent); transition:color 0.6s ease; }
  .mood-label{ margin-top:2px; font-size:15px; font-weight:700; color:var(--brown); text-transform:capitalize; }
  .updated-at{ margin-top:6px; font-size:13px; color:var(--loose-text); transition:color 0.6s ease; }

  .face-wrap{ margin-top:20px; position:relative; width:min(48vw,190px); }
  .face-wrap svg{ width:100%; height:auto; display:block; filter: drop-shadow(0 12px 20px rgba(0,0,0,0.15)); transition: transform 0.18s cubic-bezier(.34,1.56,.64,1); }
  .face-wrap.bounce svg{ animation: face-bounce 0.55s cubic-bezier(.34,1.56,.64,1); }
  @keyframes face-bounce{
    0%{ transform:scale(1) rotate(0deg); } 30%{ transform:scale(0.9,1.08) rotate(-2deg); }
    55%{ transform:scale(1.08,0.94) rotate(2deg); } 75%{ transform:scale(0.97,1.03) rotate(-1deg); }
    100%{ transform:scale(1) rotate(0deg); }
  }

  .face{ display:none; }
  .face.active{ display:block; }

  .bubble{
    margin-top:18px; min-height:74px; width:100%; max-width:340px; background:var(--white);
    border-radius:22px; padding:18px 22px; box-shadow:0 8px 24px rgba(0,0,0,0.14);
    position:relative; display:flex; align-items:center; justify-content:center;
  }
  .bubble::before{ content:""; position:absolute; top:-9px; left:50%; transform:translateX(-50%) rotate(45deg); width:18px; height:18px; background:var(--white); border-radius:4px; }
  .bubble p{ margin:0; font-family:'Baloo 2',cursive; font-weight:600; font-size:clamp(15px,4.3vw,18px); line-height:1.4; color:var(--brown); }

  .status-dot{ display:inline-block; width:8px; height:8px; border-radius:50%; background:#5FD37D; margin-right:6px; animation: pulse-dot 1.8s ease-in-out infinite; }
  @keyframes pulse-dot{ 0%,100%{ opacity:1; } 50%{ opacity:0.35; } }
  .live-row{ display:flex; align-items:center; justify-content:center; margin-top:22px; font-size:12px; font-weight:700; color:var(--loose-text); letter-spacing:0.5px; text-transform:uppercase; transition:color 0.6s ease; }

  .back-link{ margin-top:34px; font-size:12px; color:var(--loose-text); opacity:0.75; text-decoration:none; border-bottom:1px dashed var(--loose-text); }
</style>
</head>

<script>
  var SUPABASE_URL = "https://knxaqkhoyabptcpgaedr.supabase.co";
  var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtueGFxa2hveWFicHRjcGdhZWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NDUyMTUsImV4cCI6MjEwMDAyMTIxNX0.DD8aTYwjuzMrfYeYOdAn_mgHboC-_IU6Zen3RUSwvBc";

  (function(){
    var moods = {
      happy:   { particles: ['💕','💗','🩷','💖'], label: 'Happy', suggestion: "She's happy! Keep being wonderful 💕" },
      tired:   { particles: ['💤'], label: 'Tired', suggestion: "She's tired — maybe let her rest 🤍" },
      sad:     { particles: ['💧','🩵'], label: 'Sad', suggestion: "She's sad — she might need a hug 💙" },
      mad:     { particles: ['💢'], label: 'Mad', suggestion: "She's upset — tread gently, and check in 🔥" },
      hungry:  { particles: ['🍙','🍡','🍜'], label: 'Hungry', suggestion: "She's hungry — feed her! 🍙" },
      sleepy:  { particles: ['⭐','🌙','💤'], label: 'Sleepy', suggestion: "She's sleepy — let her nap 🌙" },
      excited: { particles: ['✨','🎉','⭐','💛'], label: 'Excited', suggestion: "She's excited — celebrate with her! 🎉" },
      naughty: { particles: ['💜','😏'], label: 'Naughty', suggestion: "She's feeling mischievous 😏 watch out" }
    };

    var body = document.body;
    var face = document.getElementById('face');
    var faceGroups = document.querySelectorAll('.face');
    var moodLabel = document.getElementById('moodLabel');
    var updatedAtEl = document.getElementById('updatedAt');
    var suggestionText = document.getElementById('suggestionText');
    var currentParticles = ['💕','💗','🩷','💖'];
    var currentMood = null;
    var lastUpdatedIso = null;

    function applyMood(mood, bounce){
      var config = moods[mood];
      if (!config) return;

      body.className = 'mood-' + mood;
      faceGroups.forEach(function(g){ g.classList.toggle('active', g.dataset.mood === mood); });
      currentParticles = config.particles;
      moodLabel.textContent = config.label;
      suggestionText.textContent = config.suggestion;

      if (bounce){
        face.classList.remove('bounce');
        void face.offsetWidth;
        face.classList.add('bounce');
      }
    }

    var particleLayer = document.getElementById('particle-layer');
    function spawnParticle(){
      var el = document.createElement('div');
      el.className = 'floating-particle';
      var set = currentParticles;
      el.textContent = set[Math.floor(Math.random() * set.length)];
      var left = Math.random() * 100;
      var duration = 7 + Math.random() * 6;
      var size = 14 + Math.random() * 16;
      var drift = (Math.random() * 80 - 40) + 'px';
      el.style.left = left + 'vw';
      el.style.fontSize = size + 'px';
      el.style.setProperty('--drift', drift);
      el.style.animationDuration = duration + 's';
      particleLayer.appendChild(el);
      setTimeout(function(){ el.remove(); }, duration * 1000 + 200);
    }
    setInterval(spawnParticle, 900);
    for (var i = 0; i < 4; i++){ setTimeout(spawnParticle, i * 300); }

    function timeAgo(iso){
      var diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (diff < 10) return 'just now';
      if (diff < 60) return diff + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    function refreshTimestamp(){
      if (lastUpdatedIso){
        updatedAtEl.textContent = 'updated ' + timeAgo(lastUpdatedIso);
      }
    }
    setInterval(refreshTimestamp, 15000);

    function fetchMood(){
      fetch(SUPABASE_URL + '/rest/v1/mood_state?id=eq.1&select=mood,updated_at', {
        headers: { apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY }
      })
      .then(function(res){ return res.json(); })
      .then(function(data){
        if (data && data[0]){
          var mood = data[0].mood;
          lastUpdatedIso = data[0].updated_at;
          refreshTimestamp();
          if (mood !== currentMood){
            var isFirstLoad = (currentMood === null);
            currentMood = mood;
            applyMood(mood, !isFirstLoad);
          }
        }
      })
      .catch(function(){
        if (currentMood === null){
          moodLabel.textContent = 'Offline';
          suggestionText.textContent = "Can't reach her mood right now — check your connection.";
        }
      });
    }

    fetchMood();
    setInterval(fetchMood, 4000);
  })();
</script>

</body>
</html>
